<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Seller Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<!-- NAVBAR -->
<nav class="bg-black text-white p-4 flex justify-between items-center">

<h1 class="text-2xl font-bold text-yellow-400">Seller Panel</h1>

<a href="/" class="text-sm">← Back to Home</a>

</nav>

<!-- MAIN -->
<div class="max-w-6xl mx-auto p-6">

<h2 class="text-2xl font-bold mb-6">Upload Product</h2>

<!-- FORM -->
<div class="bg-white p-6 rounded-xl shadow mb-10">

<input id="name" placeholder="Product Name"
class="w-full p-3 border rounded mb-3">

<input id="price" type="number" placeholder="Price"
class="w-full p-3 border rounded mb-3">

<input id="image" type="file"
class="w-full p-3 border rounded mb-3">

<button onclick="uploadProduct()"
class="bg-indigo-600 text-white px-6 py-2 rounded hover:bg-indigo-700">

Upload Product

</button>

<p id="status" class="mt-3 text-green-600"></p>

</div>

<!-- PREVIEW -->
<h2 class="text-xl font-bold mb-4">Uploaded Products (Live AI)</h2>

<div id="products"
class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>

</div>

<script>

const BASE_URL = "http://127.0.0.1:5000";

/* UPLOAD PRODUCT */
async function uploadProduct(){

const name = document.getElementById("name").value;
const price = document.getElementById("price").value;
const image = document.getElementById("image").files[0];

if(!name || !price || !image){
alert("Fill all fields!");
return;
}

const formData = new FormData();
formData.append("name", name);
formData.append("price", price);
formData.append("image", image);

document.getElementById("status").innerText = "Uploading...";

const res = await fetch(`${BASE_URL}/add-product`,{
method:"POST",
body: formData
});

const data = await res.json();

document.getElementById("status").innerText =
"✅ Uploaded with AI Trust: " + data.trust_score.toFixed(2) + "%";

loadProducts();

}


/* LOAD PRODUCTS */
async function loadProducts(){

const res = await fetch(`${BASE_URL}/products`);
const data = await res.json();

const container = document.getElementById("products");
container.innerHTML="";

data.forEach(p=>{

container.innerHTML += `

<div class="bg-white p-4 rounded-xl shadow">

<img src="http://127.0.0.1:5000/${p.image}"
class="h-40 w-full object-cover rounded">

<h3 class="font-semibold mt-2">${p.name}</h3>

<p class="text-indigo-600 font-bold">₹${p.price}</p>

<p class="text-green-600 text-sm">
AI Trust: ${p.trust_score.toFixed(2)}%
</p>

<p class="text-gray-500 text-xs">
Detected: ${p.ai_label}
</p>

</div>

`;

});

}

/* INIT */
loadProducts();

</script>

</body>
</html>
